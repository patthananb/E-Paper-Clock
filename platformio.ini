; ClaudeMeterEpaper — Claude Code usage meter on Waveshare ESP32-S3-ePaper-1.54
;
; Firmware-only. Reuses the Clawdmeter Python daemon UNMODIFIED by matching its
; BLE GATT contract (device name "Clawdmeter" + custom service/characteristics).
; The daemon polls Anthropic rate-limit headers and writes a small JSON payload
; over BLE; this firmware renders it on the 200x200 e-paper. No mascot, no HID.

[env:esp32-s3-epaper-154]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv

build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1

lib_deps =
    zinggjm/GxEPD2 @ ^1.6.4
    adafruit/Adafruit GFX Library @ ^1.11.11
    bblanchon/ArduinoJson @ ^7.2.0
    h2zero/NimBLE-Arduino @ ^2.2.3
